# ============================================================
# GN2 Jet Flavour Tagger — Configurazione
# ============================================================
# Implementazione fedele all'articolo:
#   "Transforming jet flavour tagging at ATLAS"
#   Nature Communications (2026) 17:541
#
# Struttura HDF5 attesa:
#   /jets          — variabili jet-level
#   /tracks        — variabili track-level (una riga per traccia)
#   /eventwise     — variabili evento
#   /truth_hadrons — informazioni truth hadron
# ============================================================

data:
  h5_path: "../dataset/mc-flavtag-ttbar-small.h5"

  # Numero massimo di tracce per jet
  # Paper: "a fixed-size array of 40 track feature vectors"
  max_tracks: 40

  # ----------------------------------------------------------
  # JET-LEVEL FEATURES  (njf = 2)
  # Copiate per ogni traccia e concatenate al vettore di traccia.
  # ----------------------------------------------------------
  jet_features:
    - "pt_btagJes"     # pT jet calibrato [MeV] — verrà log-trasformato
    - "eta_btagJes"    # η jet calibrato

  # ----------------------------------------------------------
  # TRACK-LEVEL FEATURES  (ntf = 24)
  # Paper: "impact parameter significances and angular variables
  # emerge as particularly influential"
  # NON incluse: holes nel silicon ("found to have no impact")
  # NON incluse: GN2v01_trackOrigin/vertexIndex (output GN2 = leakage)
  # NON incluse: ftagTruth* (ground truth simulazione = leakage)
  # NON incluse: valid (usata solo come maschera)
  # ----------------------------------------------------------
  track_features:
    # Impact parameters con segno lifetime (rispetto al PV)
    - "lifetimeSignedD0"                      # d0 con segno
    - "lifetimeSignedZ0SinTheta"              # z0·sinθ con segno
    - "lifetimeSignedD0Significance"          # d0/σ(d0) — più discriminante
    - "lifetimeSignedZ0SinThetaSignificance"  # z0sinθ/σ(z0sinθ) — più discriminante
    - "d0Uncertainty"                         # σ(d0)
    - "z0SinThetaUncertainty"                 # σ(z0sinθ)
    # Cinematica della traccia
    - "pt"             # pT traccia [MeV]
    - "ptfrac"         # pT_track / pT_jet
    - "theta"          # angolo polare θ
    - "qOverP"         # carica/momento [MeV⁻¹]
    - "qOverPUncertainty"
    # Variabili angolari traccia–jet
    - "deta"           # Δη(traccia, jet)
    - "dphi"           # ΔΦ(traccia, jet)
    # Hit nel pixel detector
    - "numberOfInnermostPixelLayerHits"           # b-layer
    - "numberOfNextToInnermostPixelLayerHits"
    - "numberOfPixelHits"
    - "numberOfPixelSharedHits"
    - "numberOfPixelSplitHits"
    - "numberOfInnermostPixelLayerSharedHits"
    - "numberOfInnermostPixelLayerSplitHits"
    # Hit nel SCT
    - "numberOfSCTHits"
    - "numberOfSCTSharedHits"
    # Qualità del fit
    - "phiUncertainty"
    - "thetaUncertainty"

  # ----------------------------------------------------------
  # TARGET
  # HadronConeExclTruthLabelID: PDG ID dell'adrone HF più
  # pesante nel cono ΔR < 0.3 (con cone exclusion).
  # Standard ATLAS per jet flavour labeling.
  # ----------------------------------------------------------
  label_column: "HadronConeExclTruthLabelID"   # nel gruppo /jets
  label_map:
    5:  0   # b-jet
    4:  1   # c-jet
    0:  2   # light-jet
    15: 3   # τ-jet

  # ----------------------------------------------------------
  # SELEZIONE JET
  # Paper: "jets with pT > 20 GeV... |η| < 2.5"
  # Unità ATLAS interne: MeV
  # ----------------------------------------------------------
  pt_min_mev:  20000.0      # 20 GeV
  pt_max_mev:  6000000.0    # 6 TeV
  eta_max:     2.5
  filter_pileup: true       # escludi isJvtPU == 1

  # ----------------------------------------------------------
  # SELEZIONE TRACCE
  # La colonna "valid" (bool) nel gruppo /tracks indica le
  # tracce che passano i tagli di qualità ATLAS:
  #   |η| < 2.5, pT > 500 MeV, ≥ 8 silicon hits,
  #   |d0| < 3.5 mm, |z0 sinθ| < 5 mm, ecc.
  # ----------------------------------------------------------
  use_valid_mask: true    # filtra le tracce con valid == False

  # ----------------------------------------------------------
  # SPLIT
  # ----------------------------------------------------------
  train_fraction: 0.70
  val_fraction:   0.15
  test_fraction:  0.15
  split_seed: 42

  # ----------------------------------------------------------
  # RE-SAMPLING per bilanciare le classi
  # Paper: "b-jets, light-jets and τ-jets are re-sampled in
  # pT and η to match the corresponding c-jet distributions"
  # ----------------------------------------------------------
  resampling:
    enabled: true
    reference_class: 1      # c-jet è il riferimento
    n_pt_bins: 10
    n_eta_bins: 4
    pt_range_mev: [20000.0, 250000.0]
    eta_range: [-2.5, 2.5]

# ----------------------------------------------------------
# MODELLO
# ----------------------------------------------------------
model:
  # Dimensioni (calcolate automaticamente, qui per riferimento)
  n_jet_features:    2    # len(jet_features)
  n_track_features:  24   # len(track_features)
  max_tracks:        40
  num_classes:       4    # b, c, light, tau

  # Track initialiser network
  # Paper: "single hidden layer and an output layer of size 256"
  initialiser_hidden_dim: 256
  initialiser_output_dim: 256   # embedding dimension

  # Transformer encoder
  # Paper: "four layer transformer encoder with eight attention heads,
  #         embedding size of 256, feed-forward dimension 512,
  #         uses preLayerNorm"
  transformer_n_layers:  4
  transformer_n_heads:   8
  transformer_embed_dim: 256
  transformer_ffn_dim:   512
  transformer_dropout:   0.0

  # Jet classification head
  # Paper: "three hidden layers with size 128, 64 and 32,
  #         ReLU activation"
  head_hidden_dims: [128, 64, 32]
  head_dropout:     0.0
  activation:       "relu"

# ----------------------------------------------------------
# TRAINING
# ----------------------------------------------------------
training:
  max_epochs: 100
  batch_size: 12000          # Paper: "A batch size of 12,000"
  early_stopping_patience: 15

  optimizer: "adamw"         # Paper: "AdamW optimiser"
  weight_decay: 1.0e-5       # Paper: "weight decay of 1e-5"

  # Paper: cosine annealing con warmup lineare nel primo 1%
  lr_initial:      1.0e-7
  lr_peak:         5.0e-4
  lr_final:        1.0e-5
  warmup_fraction: 0.01

  device: "auto"
  grad_clip_norm: 1.0
  log_every_n_batches: 50

# ----------------------------------------------------------
# DISCRIMINANTE (equazioni 1 e 2 dell'articolo)
# D_b = log[ pb / (fc·pc + fτ·pτ + (1-fc-fτ)·pu) ]
# ----------------------------------------------------------
discriminant:
  fc_btag:   0.2
  ftau_btag: 0.05
  fb_ctag:   0.3
  ftau_ctag: 0.01
  operating_points: [0.65, 0.70, 0.77, 0.85, 0.90]

output:
  save_dir: "outputs/"
  save_best: true
  save_last: true
  plot_roc: true
  plot_rejection_vs_efficiency: true